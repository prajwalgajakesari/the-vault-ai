<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault — AI Edition | March 29, 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0c0c10;
            color: #e4e4e7;
            line-height: 1.6;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(88, 28, 135, 0.15) 0%, rgba(30, 58, 138, 0.15) 100%);
            border-bottom: 1px solid #2e2e3e;
            padding: 3rem 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .hero .meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.95rem;
            color: #a1a1a6;
            margin-top: 1rem;
        }

        /* Navigation */
        nav.category-nav {
            position: sticky;
            top: 0;
            background-color: #0c0c10;
            border-bottom: 1px solid #2e2e3e;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            z-index: 100;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .nav-container {
            display: flex;
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto;
            white-space: nowrap;
        }

        .nav-tab {
            padding: 0.5rem 1rem;
            border: 1px solid #2e2e3e;
            background-color: transparent;
            color: #a1a1a6;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-tab.active {
            color: #e4e4e7;
            border-color: #e4e4e7;
        }

        .nav-tab:hover {
            border-color: #e4e4e7;
            color: #e4e4e7;
        }

        .nav-tab.business { --accent: #f59e0b; }
        .nav-tab.llms { --accent: #8b5cf6; }
        .nav-tab.research { --accent: #06b6d4; }
        .nav-tab.policy { --accent: #ef4444; }

        .nav-tab.active.business,
        .nav-tab.active.llms,
        .nav-tab.active.research,
        .nav-tab.active.policy {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Stories Grid */
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .story-card {
            background-color: #1e1e2e;
            border: 1px solid #2e2e3e;
            border-radius: 6px;
            padding: 1.5rem;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .story-card:hover {
            border-color: #3e3e4e;
        }

        .story-card.business {
            --accent-color: #f59e0b;
        }

        .story-card.llms {
            --accent-color: #8b5cf6;
        }

        .story-card.research {
            --accent-color: #06b6d4;
        }

        .story-card.policy {
            --accent-color: #ef4444;
        }

        .story-card:hover {
            border-color: var(--accent-color);
        }

        .category-pill {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            width: fit-content;
        }

        .category-pill.business {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .category-pill.llms {
            background-color: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }

        .category-pill.research {
            background-color: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }

        .category-pill.policy {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .story-headline {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .story-headline a {
            color: #e4e4e7;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .story-headline a:hover {
            color: #a1a1a6;
        }

        .story-meta {
            font-size: 0.85rem;
            color: #71717a;
            margin-bottom: 1rem;
        }

        .story-teaser {
            font-size: 0.95rem;
            color: #a1a1a6;
            margin-bottom: 1rem;
            flex-grow: 1;
            line-height: 1.5;
        }

        .read-more {
            color: var(--accent-color, #e4e4e7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .read-more:hover {
            transform: translateX(2px);
        }

        /* Feature Sections */
        .feature-section {
            background-color: #1e1e2e;
            border: 1px solid #2e2e3e;
            border-radius: 6px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .feature-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #e4e4e7;
        }

        /* Quote Section */
        .quote-block {
            border-left: 4px solid #8b5cf6;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .quote-text {
            font-size: 1.2rem;
            font-style: italic;
            color: #e4e4e7;
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }

        .quote-author {
            color: #71717a;
            font-size: 0.9rem;
        }

        /* By the Numbers Grid */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .number-card {
            text-align: center;
            padding: 1.5rem;
            background-color: rgba(139, 92, 246, 0.05);
            border: 1px solid #2e2e3e;
            border-radius: 6px;
        }

        .big-number {
            font-size: 2rem;
            font-weight: 700;
            color: #8b5cf6;
            margin-bottom: 0.5rem;
        }

        .number-label {
            color: #a1a1a6;
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            border-top: 1px solid #2e2e3e;
            padding: 2rem 1.5rem;
            margin-top: 3rem;
            text-align: center;
            color: #71717a;
            font-size: 0.9rem;
        }

        footer a {
            color: #8b5cf6;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: #e4e4e7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero .meta {
                flex-direction: column;
                gap: 0.5rem;
            }

            .stories-grid {
                grid-template-columns: 1fr;
            }

            .numbers-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .hero {
                padding: 2rem 1rem;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            nav.category-nav {
                padding: 0.75rem 1rem;
                margin-bottom: 1.5rem;
            }

            .container {
                padding: 0 1rem;
            }

            .feature-section {
                padding: 1.5rem 1rem;
            }

            .numbers-grid {
                grid-template-columns: 1fr;
            }

            .number-card {
                padding: 1rem;
            }

            .big-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>The Vault — AI Edition</h1>
        <div class="meta">
            <span>March 29, 2026</span>
            <span>10 stories · ~8,400 words</span>
        </div>
    </div>

    <nav class="category-nav">
        <div class="nav-container">
            <button class="nav-tab active" onclick="filterCategory('all');">All</button>
            <button class="nav-tab business" onclick="filterCategory('business');">Business</button>
            <button class="nav-tab llms" onclick="filterCategory('llms');">LLMs & GenAI</button>
            <button class="nav-tab research" onclick="filterCategory('research');">Research</button>
            <button class="nav-tab policy" onclick="filterCategory('policy');">Policy</button>
        </div>
    </nav>

    <div class="container">
        <div class="stories-grid" id="storiesGrid">
