    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #15131d;
            --bg-tertiary: #1f1d2b;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1a6;
            --text-muted: #6b6b76;

            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;

            --gradient-primary: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);

            scroll-behavior: smooth;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Sticky Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(225, 225, 230, 0.1);
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        header.scrolled {
            transform: translateY(0);
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .header-logo {
            font-size: 1.125rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            white-space: nowrap;
        }

        .header-subscribe {
            display: none;
        }

        @media (min-width: 768px) {
            .header-subscribe {
                display: block;
            }

            .header-subscribe form {
                display: flex;
                gap: 0.5rem;
            }

            .header-subscribe input {
                width: 200px;
                padding: 0.5rem 1rem;
                background: rgba(225, 225, 230, 0.05);
                border: 1px solid rgba(225, 225, 230, 0.1);
                border-radius: 0.375rem;
                color: var(--text-primary);
                font-size: 0.875rem;
                transition: all 0.2s;
            }

            .header-subscribe input:focus {
                outline: none;
                background: rgba(225, 225, 230, 0.1);
                border-color: var(--accent-purple);
            }

            .header-subscribe button {
                padding: 0.5rem 1.5rem;
                background: var(--gradient-primary);
                border: none;
                border-radius: 0.375rem;
                color: white;
                font-weight: 600;
                cursor: pointer;
                font-size: 0.875rem;
                transition: all 0.2s;
            }

            .header-subscribe button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
            }
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .hero h1 .gradient-text {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero .tagline {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .form-group {
                flex-direction: row;
            }
        }

        .form-group input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: rgba(225, 225, 230, 0.05);
            border: 1px solid rgba(225, 225, 230, 0.2);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(225, 225, 230, 0.1);
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group button {
            padding: 1rem 2rem;
            background: var(--gradient-primary);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: inherit;
        }

        .form-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3);
        }

        .form-group button:active {
            transform: translateY(0);
        }

        .hero-disclaimer {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Section Base Styles */
        section {
            padding: 5rem 1.5rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-header {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
        }

        /* What You Get Section */
        .what-you-get {
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.05) 0%, transparent 100%);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid rgba(225, 225, 230, 0.1);
            border-radius: 0.75rem;
            padding: 2rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: currentColor;
        }

        .card-category {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card.llm { color: var(--accent-purple); }
        .card.research { color: var(--accent-cyan); }
        .card.business { color: var(--accent-amber); }
        .card.policy { color: var(--accent-red); }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(225, 225, 230, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

    <script>
        // Sticky header on scroll
        const header = document.getElementById('header');
        let lastScrollTop = 0;

        window.addEventListener('scroll', function() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            if (scrollTop > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }

            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });

        // Form submission handling (placeholder)
        const forms = document.querySelectorAll('form[action="#subscribe"]');
        forms.forEach(form => {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const email = this.querySelector('input[type="email"]').value;
                // Placeholder: In production, this would send to Resend API
                console.log('Subscribe request for:', email);
                alert('Thanks for subscribing! Check your email for confirmation.');
                this.reset();
            });
        });
    </script>
